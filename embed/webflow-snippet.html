<!--
  Clinekt Leakage Calculator on Webflow, step by step

  1. Host the two files somewhere static (Cloudflare Pages, Netlify, or
     GitHub Pages are free; Webflow itself cannot host .html/.js files):
       clinekt-leakage-calculator.html
       clinekt-leakage-embed.js

  2. In the Webflow Designer, open the homepage, add a Section where the
     calculator should live, drop an Embed element inside it, and paste the
     snippet below. Replace YOUR-HOST with your hosting URL.

  3. Publish. The calculator fills the section width (max 1180px, centered)
     and the iframe auto-sizes to the content, so it reads as a native
     section of the page. Webflow styles cannot touch it.

  Tip: the section background should be #F5F5F7 (or white) to blend with
  the calculator background.
-->
<div id="clinekt-leakage-calculator"></div>
<script src="https://YOUR-HOST/clinekt-leakage-embed.js"
        data-src="https://YOUR-HOST/clinekt-leakage-calculator.html"></script>
