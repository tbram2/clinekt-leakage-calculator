<!--
  Clinekt Leakage Calculator on Webflow

  Hosted on GitHub Pages from github.com/tbram2/clinekt-leakage-calculator.
  Pushing to main redeploys automatically in about a minute.

  1. In the Webflow Designer, open the homepage, add a Section where the
     calculator should live, drop an Embed element inside it, and paste the
     snippet below.

  2. Publish. The calculator fills the section width (max 1180px, centered)
     and the iframe auto-sizes to the content, so it reads as a native
     section of the page. Webflow styles cannot touch it.

  Tip: the section background should be #F5F5F7 (or white) to blend with
  the calculator background.
-->
<div id="clinekt-leakage-calculator"></div>
<script src="https://tbram2.github.io/clinekt-leakage-calculator/embed/clinekt-leakage-embed.js"
        data-src="https://tbram2.github.io/clinekt-leakage-calculator/clinekt-leakage-calculator.html"></script>
