<style>
/* -- FAQs page ---------------------------------------------
   Shares clinekt.css with the homepage (nav, buttons, footer,
   cta). Everything below is page-only (.fq-*).              */
.nav{border-bottom-color:var(--line-2)}
.nav::before{opacity:1}
.fq-main{padding:150px 0 40px;background:var(--paper)}
.fq-head{max-width:64ch}
.fq-head .eyebrow{display:block;margin-bottom:16px}
.fq-head h1{font-size:clamp(38px,4.6vw,58px);letter-spacing:var(--ls-display);line-height:1.06;color:var(--ink)}
.fq-head p{margin-top:18px;font-size:18px;line-height:1.6;color:var(--body);max-width:52ch}
.fq-list{margin:56px 0 0;display:grid;gap:14px;max-width:860px}
.fq-item{background:var(--paper-2);border:1px solid var(--line-2);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.fq-item[open]{border-color:rgba(0,113,227,.28);box-shadow:var(--shadow-sm)}
.fq-item summary{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:20px 24px;cursor:pointer;font-size:16.5px;font-weight:600;color:var(--ink);list-style:none}
.fq-item summary::-webkit-details-marker{display:none}
.fq-item summary::after{content:"";flex:0 0 auto;width:10px;height:10px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);transition:transform .22s var(--ease);margin-top:-4px}
.fq-item[open] summary::after{transform:rotate(225deg);margin-top:4px}
.fq-item p{padding:0 24px 22px;font-size:15.5px;line-height:1.65;color:var(--body);max-width:72ch}
.fq-item a{color:var(--blue);font-weight:600}
.fq-cta{padding:72px 0 96px;background:var(--paper)}
.fq-cta-in{background:linear-gradient(145deg,#0A6FE6,#063FB0);border-radius:var(--r-xl);padding:clamp(48px,6vw,72px) clamp(28px,5vw,64px);text-align:center;color:#fff}
.fq-cta-in h2{font-size:clamp(28px,3.4vw,44px);letter-spacing:var(--ls-display);color:#fff}
.fq-cta-in p{margin:14px auto 0;font-size:17px;color:rgba(255,255,255,.88);max-width:46ch}
.fq-cta-in .btn-white{background:#fff;color:var(--blue);margin-top:30px}
@media(max-width:640px){
  .fq-main{padding:120px 0 24px}
  .fq-item summary{padding:17px 18px;font-size:15px}
  .fq-item p{padding:0 18px 18px;font-size:14.5px}
  .fq-list{margin-top:40px}
}
</style>
