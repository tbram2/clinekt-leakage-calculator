<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/tbram2/clinekt-leakage-calculator@24b1ded/site-assets/clinekt.css">
<style>
/* -- Book a Demo page ---------------------------------------------
   Shares clinekt.css with the homepage (nav, buttons, chips, footer,
   agent-list checkmarks). Everything below is page-only (.bd-*).   */
/* blur stays on .nav::before (from clinekt.css) - backdrop-filter on .nav itself would become
   the containing block for the fixed .nav-m menu and collapse it */
.nav{border-bottom-color:var(--line-2)}
.nav::before{opacity:1}
.bd-main{position:relative;padding:148px 0 96px;min-height:100svh;display:flex;align-items:center;overflow:clip;background:linear-gradient(140deg,#0A2A52 0%,#0C3D7F 48%,#1163D6 100%)}
.bd-main::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 88% 0%,rgba(120,185,255,.22),transparent 62%);pointer-events:none}
.bd-grid{position:relative;z-index:1}
.bd-grid{display:grid;grid-template-columns:1.04fr .96fr;gap:clamp(44px,5vw,76px);align-items:center;width:100%}
.bd-left .eyebrow{color:#9CC5FF}
.bd-left h1{font-size:clamp(44px,5vw,64px);letter-spacing:var(--ls-display);line-height:1.05;color:#fff;margin-top:18px}
.bd-sub{margin-top:24px;font-size:19px;line-height:1.65;color:rgba(235,243,255,.85);max-width:44ch}
.bd-left .agent-list li{color:#fff}
.bd-left .ck{background:rgba(255,255,255,.14)}
.bd-left .ck svg{stroke:#BBD9FF}
.bd-left .hero-mini span{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#EAF2FE;box-shadow:none}
.bd-left .hero-mini svg{stroke:#9CC5FF}
.bd-left .agent-list{margin-top:44px;gap:18px}
.bd-left .agent-list li{font-size:17px}
.bd-left .agent-list .ck{width:38px;height:38px;border-radius:11px}
.bd-left .hero-mini{margin-top:44px;gap:12px}
.bd-left .hero-mini span{font-size:14px;padding:9px 15px}
.bd-left .hero-mini svg{width:17px;height:17px}
.bd-card{background:var(--paper-2);border:1px solid var(--line-2);border-radius:22px;padding:clamp(26px,3vw,38px);box-shadow:0 40px 90px -40px rgba(4,20,50,.55)}
.bd-card h2{font-size:22px;letter-spacing:-.01em;color:var(--ink)}
.bd-card .bd-card-sub{font-size:14.5px;color:var(--body);margin:8px 0 22px}
.bd-form{display:grid;gap:18px}
.bd-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.bd-field{display:grid;gap:8px}
.bd-field label{font-size:14px;font-weight:500;color:var(--ink)}
.bd-field .req{color:#C0392B;margin-left:3px}
.bd-field input{height:48px;width:100%;border:1px solid #DCDCD7;border-radius:8px;padding:0 14px;font:inherit;font-size:15px;color:var(--ink);background:#fff;transition:border-color .15s,box-shadow .15s;appearance:none;-webkit-appearance:none}
.bd-field input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
.bd-field input::placeholder{color:var(--muted)}
.bd-submit{width:100%;justify-content:center;margin-top:6px;padding:15px 26px;font-size:15.5px;border:0;border-radius:10px;cursor:pointer}
.bd-note{font-size:13px;color:var(--muted);text-align:center;margin-top:2px}
.w-form-done{padding:18px;border-radius:12px;background:#E9F8EF;color:#0B7A43;font-weight:600;text-align:center;font-size:15px}
.w-form-fail{padding:14px;border-radius:12px;background:#FDEEEE;color:#B3261E;font-weight:600;text-align:center;font-size:14px;margin-top:12px}
@media(max-width:1000px){
  .bd-main{padding:118px 0 80px;align-items:flex-start}
  .bd-grid{grid-template-columns:minmax(0,1fr);gap:40px}
  .bd-left h1{font-size:clamp(34px,7vw,44px)}
}
@media(max-width:640px){
  .bd-row2{grid-template-columns:1fr}
  .bd-left .hero-mini{gap:6px;flex-wrap:nowrap;margin-top:32px}
  .bd-left .hero-mini span{font-size:10.5px;padding:5px 8px;gap:5px;white-space:nowrap}
  .bd-left .hero-mini svg{width:12px;height:12px}
  .bd-main{padding:100px 0 64px}
}
</style>
