          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A dormant patient has gone past their expected return interval with no future appointment on the books. For most specialty practices that means 12 to 18 months since the last visit, but the right threshold depends on the recall interval for the condition: a glaucoma patient is dormant at 13 months, while a skin-check patient may not be dormant until month 18. Define it per recall type in your EHR rather than with one blanket rule."
          }

          "name": "How many outreach touches does it take to reactivate a dormant patient?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Plan on three to five touches across at least two channels over two to three weeks. A single text recovers the easiest patients, but phone outreach remains the most effective single channel in the published evidence, so sequences that include a call outperform text-only campaigns. Stop when the patient books, opts out, or finishes the sequence."
          }
        },

          "@type": "Question",
          "name": "Can you text dormant patients without getting new consent?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In most cases yes, when the message concerns the patient's own care: recall and follow-up outreach is treatment communication under HIPAA, and most intake forms already capture phone and text consent. You still need to honor opt-outs immediately, keep clinical details out of message bodies, and confirm your consent language covers automated calls and texts under the TCPA. Have counsel review the templates once before the first campaign, then reuse them."
          }
        },

          "@type": "Question",

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, a small list can be worked from an EHR report and a spreadsheet. The manual approach breaks down at scale, because a few thousand dormant charts means hundreds of staff hours per cycle, which is why practices either cap the program at the warm tier or automate it. AI agents now run the full sequence across voice, text, and email and write outcomes back to the EHR, leaving staff only the exceptions."
