        {
          "@type": "Question",
          "name": "Is patient activation the same as patient engagement?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Patient engagement describes activities the organization initiates, such as portal messages, reminders, and education. Patient activation describes the patient's own knowledge, skills, and confidence to manage their health, visible in actions like booking and completing care. Engagement can be high while activation stays low, which is why activity metrics alone do not predict outcomes."
          }
        },
        {
          "@type": "Question",
          "name": "What is patient engagement in healthcare?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Patient engagement is the set of strategies and tools healthcare organizations use to involve patients in their care, including patient portals, appointment reminders, educational content, and two-way messaging. It is organization-driven and is typically measured with activity metrics such as portal logins and message open rates."
          }
        },
        {
          "@type": "Question",
          "name": "Why is patient activation important?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Activation is one of the few patient-level measures that consistently predicts what happens next. Peer-reviewed research links low activation to higher costs, worse health outcomes, and more hospital use after discharge. For a practice, activation is also the measure closest to revenue, because activated patients book appointments, show up, and complete their care plans."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between patient activation and patient reactivation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Patient activation is a patient's capacity and willingness to act on their care, shown in behavior. Reactivation is the industry term for bringing dormant patients, those already in your records who stopped coming in, back into care. Reactivation is activation work aimed at one specific population."
          }
        }
      ]
