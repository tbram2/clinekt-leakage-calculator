        {
          "@type": "Question",
          "name": "What is a patient recall system for medical practices?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A patient recall system identifies active patients who are due or overdue for routine care and contacts them to book an appointment. It works from the practice's own records: last visit date, recommended follow-up interval, and whether a future appointment exists. That makes it different from a reminder system, which only messages patients who already have an appointment on the schedule."
          }
        },
        {
          "@type": "Question",
          "name": "Is patient reactivation the same as patient retention?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Retention is the ongoing work of keeping active patients engaged so they never lapse, and recall is its main tool. Reactivation starts after retention has already failed: it targets patients who have gone dormant, usually 12 or more months without a visit, and works to bring them back into care."
          }
        },
        {
          "@type": "Question",
          "name": "Which patients need recall and which need reactivation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sort by time since last visit and appointment status. A patient seen within the last year who is due for care and has no appointment booked needs recall. A patient with no clinical encounter in more than 12 months is lost to follow-up and needs reactivation, a harder motion because the relationship has gone cold."
          }
        },
        {
          "@type": "Question",
          "name": "Can one system run reminders, recall, and reactivation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Reminders are usually built into the EHR or practice management system. Recall and reactivation are not, because they require generating appointments rather than confirming them. That is the gap patient activation agents fill: they work the due list and the dormant list continuously without adding front-office headcount."
