          "name": "What is patient engagement software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Patient engagement software is an umbrella term for tools that help practices communicate with patients: portals, digital intake, appointment reminders, two-way texting, recall automation, and AI agents. The categories do different jobs, so practices should choose based on which patient motion they are losing, not on the label."
          }

          "@type": "Question",
          "name": "How much does patient engagement software cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most tools price per provider or per location per month, with one-time onboarding fees and EHR integration charges layered on top. The subscription is rarely the full cost: integration fees, per-channel usage, and multi-year contract terms drive the real total, so get every fee in writing before comparing vendors."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between patient engagement and patient activation software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Engagement software helps you communicate with patients and measures activity such as logins, deliveries, and opens. Activation software is accountable for behavior: patients screened, appointments booked, and overdue patients returned to care. A practice can have strong engagement metrics and still lose patients every week, which is why activation outcomes should drive the buying decision."
          }
        },
        {
          "@type": "Question",
          "name": "Do specialty practices still need a patient portal if they add an AI agent?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, because they do different jobs. The portal serves patients who are already engaged enough to log in for records and results. An AI activation agent works on everyone else: the website visitor who has not booked, the recall patient who has not responded, and the inquiry that arrives after hours."
