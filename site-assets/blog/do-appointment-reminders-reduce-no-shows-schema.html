        {
          "@type": "Question",
          "name": "How much do appointment reminder texts reduce no-shows?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Controlled studies show automated reminders cut no-shows by a weighted mean of 28.9%, and staff phone calls by 39.1%, relative to no reminder (Hasvold & Wootton, 2011). In the most cited single study, non-attendance fell from 18.1% to 11.2% with SMS reminders, a 38% relative reduction (Koshy, Car & Majeed, 2008)."
          }
        },
        {
          "@type": "Question",
          "name": "Are automated reminders as effective as a call from staff?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Across 29 studies, manual reminders outperformed automated ones, cutting non-attendance 39.1% versus 28.9% (Hasvold & Wootton, 2011), and a three-arm study found live staff calls produced a 13.6% no-show rate versus 17.3% for automated reminders (Parikh et al., 2010). The difference is the two-way conversation, which is exactly what conversational AI makes affordable at scale."
          }
        },
        {
          "@type": "Question",
          "name": "Why do patients still no-show after receiving reminders?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Because reminders only fix forgetting. The strongest predictors of no-shows are a long lead time between booking and appointment and a prior history of missed visits (Dantas et al., 2018), and a message alone changes neither. Patients who can no longer attend need an easy way to reschedule, or they go silent and the slot dies."
          }
        },
        {
          "@type": "Question",
          "name": "How many reminders should a practice send, and when?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A confirmation at booking, a reminder about a week out, and a final reminder 24 to 48 hours before the visit is a sensible default for specialty appointments. The cadence matters less than the capability: every message should let the patient confirm, cancel, or rebook inside the same thread."
          }
        }
