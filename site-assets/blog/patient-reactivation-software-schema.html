<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": "How to evaluate a patient reactivation software vendor",
  "description": "Eight questions that separate reactivation tools that work your lapsed patient list from tools that only generate it.",
  "step": [
    {
      "@type": "HowToStep",
      "position": 1,
      "name": "Confirm the EHR integration tier",
      "text": "Ask which integration tier the vendor supports for your specific EHR by name and version, and request a reference running the same setup."
    },
    {
      "@type": "HowToStep",
      "position": 2,
      "name": "Verify automatic write-back",
      "text": "Confirm the tool writes booked appointments back into your schedule. If a human retypes bookings, your capacity is limited to what that human can retype."
    },
    {
      "@type": "HowToStep",
      "position": 3,
      "name": "Ask for the real contact rate",
      "text": "Find out what percentage of the list the tool actually contacts, using figures from a live account rather than a demo."
    },
    {
      "@type": "HowToStep",
      "position": 4,
      "name": "Check after hours coverage",
      "text": "Most patients engage outside business hours, so confirm the tool operates when patients are not at work."
    },
    {
      "@type": "HowToStep",
      "position": 5,
      "name": "Review the outreach sequence",
      "text": "Ask how many attempts the tool makes, across which channels, and whether the default sequence can be changed."
    },
    {
      "@type": "HowToStep",
      "position": 6,
      "name": "Test what happens when a patient replies",
      "text": "Ask the vendor to show a real transcript of the tool handling a patient question. This separates a campaign blaster from an agent."
    },
    {
      "@type": "HowToStep",
      "position": 7,
      "name": "Confirm white labeling",
      "text": "Verify the outreach carries your practice name, because patients respond to their doctor's office rather than an unfamiliar vendor."
    },
    {
      "@type": "HowToStep",
      "position": 8,
      "name": "Examine pricing and commitment",
      "text": "Look for pricing that does not penalize reaching more patients, and be cautious about long contract lock-ins on an unproven channel."
    }
  ]
}
</script>

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "There is no single best tool, because the right answer depends on your EHR and your list size. The most useful filter is generation: a list generator suits a practice with spare front desk capacity, while a practice with a large dormant list and a short staffed desk needs an agent that completes the conversation and writes back to the schedule."
      }
    },
    {
      "@type": "Question",
      "name": "Does patient reactivation software integrate with my EHR?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Usually in some form, but the word covers everything from a manual CSV export to full read and write-back with outcome sync. Ask which tier the vendor supports for your specific EHR by name, and confirm whether booked appointments land in your schedule without anyone retyping them."
      }
    },
    {
      "@type": "Question",
      "name": "How is reactivation software different from a recall system?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Recall targets patients who are due on a clinical schedule and still consider themselves your patients. Reactivation targets patients who have already drifted away and have no future appointment. The messaging, the timing, and the expected response rates are all different."
      }
    },
    {
      "@type": "Question",
      "name": "Can AI run reactivation campaigns on its own?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, and that is the main practical difference from earlier tooling. An agent can work an entire dormant list across voice, text, and email, answer patient questions in the moment, book the appointment, and escalate only the exceptions to staff. Earlier tools stop at sending the message."
      }
    },
    {
      "@type": "Question",
      "name": "How long does it take to see results from patient reactivation software?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask each vendor for time to go live and time to first booking as separate numbers, because they are often very different. A tool that takes a quarter to implement has a real cost in patients who lapse further during the wait."
