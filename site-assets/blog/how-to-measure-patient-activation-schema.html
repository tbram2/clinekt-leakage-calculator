          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PAM scores run from 0 to 100 and higher is better, but there is no universal passing grade. Scores band into four levels, and movement matters more than the raw number: a patient who climbs one level is the win the research rewards. If you do not license the PAM, a rising booking rate and recall return rate tell you the same story."

          "@type": "Question",
          "name": "Is the PAM free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The PAM is a proprietary, licensed instrument: the items are copyrighted, scoring requires the licensed algorithm, and commercial terms are negotiated with the rights holder rather than published. Researchers can apply for academic licenses, but a practice cannot simply copy the questionnaire out of a journal article."
          }
        },
        {
          "@type": "Question",
          "name": "What is the PAM-13?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The PAM-13 is the 13-item short form of the original 22-item Patient Activation Measure. Patients rate agreement with each statement on a four-point scale, Rasch calibration converts the answers into a 0 to 100 score, and the score is grouped into one of four activation levels."
          }
        },
        {
          "@type": "Question",
          "name": "Can you measure patient activation without the PAM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Track the behavioral proxies your systems already record: booking rate (appointments per inbound contact), recall return rate (dormant patients who return after outreach), referral completion rate, and time-to-rebook. They measure what activated patients actually do, and they respond to outreach, which is the point of measuring in the first place."
          }
