<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": "How to calculate your referral leakage rate",
  "description": "Calculate the share of inbound referrals that never become completed visits, using data a specialty practice already has.",
  "totalTime": "PT2H",
  "step": [
    {
      "@type": "HowToStep",
      "position": 1,
      "name": "Pick a closed window",
      "text": "Choose a single month that ended at least 60 days ago, so referrals have had time to convert."
    },
    {
      "@type": "HowToStep",
      "position": 2,
      "name": "Count referrals received",
      "text": "Pull every inbound referral from that month across all channels: fax, EHR message, portal, phone, and email."
    },
    {
      "@type": "HowToStep",
      "position": 3,
      "name": "Count scheduled appointments",
      "text": "Of those referrals, count how many resulted in a scheduled appointment with any provider in your practice."
    },
    {
      "@type": "HowToStep",
      "position": 4,
      "name": "Count completed visits",
      "text": "Of those scheduled, count how many the patient actually attended."
    },
    {
      "@type": "HowToStep",
      "position": 5,
      "name": "Calculate both rates",
      "text": "Scheduling rate is scheduled divided by received. Completion rate is completed divided by received. Referral leakage rate is 100% minus the completion rate."
    },
    {
      "@type": "HowToStep",
      "position": 6,
      "name": "Segment by referral source",
      "text": "Break the same numbers out by referring practice, because leakage is almost never evenly distributed."
    },
    {
      "@type": "HowToStep",
      "position": 7,
      "name": "Measure time to first contact",
      "text": "For a sample of 20 referrals, record the hours between arrival and the first successful patient conversation."
    }
  ]
}
</script>

      "@type": "Question",
      "name": "Is referral leakage the same as patient leakage?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Referral leakage is a subset. Patient leakage covers every lost patient, including web visitors and dormant patients. Referral leakage covers only patients who arrived with a referral and never completed the visit."
      }
    },
    {
      "@type": "Question",
      "name": "What is a normal referral leakage rate?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "There is no reliable industry benchmark, and any single number quoted without a study behind it should be treated with suspicion. The best peer reviewed anchor is the 2018 Journal of General Internal Medicine analysis, where 34.8% of referral scheduling attempts ended in a completed appointment."
      }
    },
    {
      "@type": "Question",
      "name": "Why do most practices not measure referral leakage?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Because referrals arrive across several disconnected channels and no single system holds the full picture. 91% of health system executives in the ABOUT Healthcare survey said they were not sure they could calculate leakage costs. Practices face the same fragmentation with fewer analysts."
      }
    },
    {
      "@type": "Question",
      "name": "Does referral leakage only matter to health systems?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Health systems worry about patients leaving the network. Independent specialty practices lose referrals that were addressed to them specifically. That version is more fixable, because it depends on your own response process rather than on network contracts."
      }
    },
    {
      "@type": "Question",
      "name": "What is the fastest way to reduce referral leakage?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Cut time to first contact. Most referrals are lost in the days between arrival and the first real conversation with the patient. Assign an owner to every referral, respond the same day, and follow up more than once across phone and text."
      }
    }
  ]
