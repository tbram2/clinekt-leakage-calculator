        {
          "@type": "Question",
          "name": "What percentage of referrals never get scheduled?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In the largest EHR-based study, 38.9% of referral scheduling attempts never received an appointment date and only 34.8% ended in a completed specialist visit (Patel et al., 2018). Physician-tracked cohorts lose about 1 in 5. The honest answer is a range: between one in five and two in three referrals never becomes a completed appointment, depending on how actively the receiving practice works them."
          }
        },
        {
          "@type": "Question",
          "name": "Why do referral statistics contradict each other?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Because studies measure different failure points. Some count whether a referral ever got scheduled, some count whether the patient completed the visit, and some count whether the referring physician ever heard back. Each gate leaks separately, so published loss rates range from about 20% in physician-tracked cohorts to roughly two out of three in large unmanaged systems."
          }
        },
        {
          "@type": "Question",
          "name": "What is a good referral conversion rate for a specialty practice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The best published benchmark is 79.2% completion within three months, measured in a physician-tracked cohort (Forrest et al., 2007). A practice that contacts every referral the same day and follows up systematically should target completion near 80%. Rates below half usually signal operational failure: slow first contact, no single owner, and no follow-up sequence."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly should a practice contact a new referral?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The same business day it arrives, ideally within minutes. Patient motivation decays quickly after the referring visit, and across Clinekt deployments 82% of patients try to book care outside office hours, so a practice that only attempts contact during business hours misses most of the booking window."
          }
        },
        {
          "@type": "Question",
          "name": "What does closing the referral loop mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Closing the loop means the specialist confirms back to the referring physician what happened: whether the patient was seen, what was found, and what comes next. It fails constantly. Up to 45% of referrals produce no specialist-to-referrer communication (Milbank Quarterly, 2011), which is why practices that report back reliably earn a larger share of future referrals."
          }
        }
