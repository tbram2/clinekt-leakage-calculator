            "@type": "Answer",
            "text": "On Zocdoc, 43% of appointments were booked after office hours in 2025, with roughly 28% booked in the evening and about 14% overnight (<a href=\"https://zocdocpractice.zocdoc.com/wp-content/uploads/2025/12/WhatPatientsWant_ZocdocAnnualReport_2025_Final2.pdf\">Zocdoc, 2025</a>). Across Clinekt deployments, 82% of patients try to book care outside office hours."

          }

            "@type": "Answer",
            "text": "The demand is well documented: 80% of patients want to schedule anytime from home or a mobile device (<a href=\"https://www.experianplc.com/newsroom/press-releases/2025/-improving-patient-access--experian-health-survey-highlights-pro\">Experian Health, 2025</a>), and 75% of millennials booked their most recent appointment online (<a href=\"https://www.prnewswire.com/news-releases/digital-access-dominates-80-of-consumers-prioritize-scheduling-care-online-reveals-kyruus-2023-care-access-benchmark-report-301951906.html\">Kyruus Health, 2023</a>). The practical question for a specialty practice is whether the tool can screen and book patients correctly, not just collect callback requests."
